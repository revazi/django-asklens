name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        django-version: ["5.2", "6.x"]
        include:
          - django-version: "5.2"
            django-package: "Django>=5.2,<6.0"
            django-version-prefix: "5.2."
          - django-version: "6.x"
            django-package: "Django>=6.0,<7.0"
            django-version-prefix: "6."

    env:
      DJANGO_ASKLENS_LIVE_LLM: "0"
      DJANGO_ASKLENS_DEMO_LIVE_LLM: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Install Django matrix version
        run: uv pip install --reinstall "${{ matrix.django-package }}"

      - name: Run Ruff lint
        run: uv run --no-sync ruff check .

      - name: Check formatting
        run: uv run --no-sync ruff format --check .

      - name: Compile Python files
        run: uv run --no-sync python -m compileall -q django_asklens tests

      - name: Run Django system check
        run: uv run --no-sync python -m django check --settings=tests.test_project.settings

      - name: Check AskLens migrations are current
        run: uv run --no-sync python -m django makemigrations asklens --check --dry-run --settings=tests.test_project.settings

      - name: Run tests
        run: uv run --no-sync pytest --strict-config --strict-markers

      - name: Build package
        run: uv run --no-sync python -m build

      - name: Check package metadata
        run: uv run --no-sync twine check dist/*

      - name: Inspect package artifacts
        run: |
          uv run --no-sync python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          dist = Path("dist")
          wheels = sorted(dist.glob("django_asklens-*.whl"))
          sdists = sorted(dist.glob("django_asklens-*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"Expected one wheel and one sdist, got {wheels=} {sdists=}")

          with zipfile.ZipFile(wheels[0]) as wheel:
              wheel_names = set(wheel.namelist())
          with tarfile.open(sdists[0], "r:gz") as sdist:
              sdist_names = set(sdist.getnames())

          forbidden_fragments = (".agents/", "asklens-llm-io")
          for artifact_name, names in ((wheels[0].name, wheel_names), (sdists[0].name, sdist_names)):
              forbidden = [
                  name
                  for name in names
                  if any(fragment in name for fragment in forbidden_fragments)
              ]
              if forbidden:
                  raise SystemExit(f"Forbidden local-only files in {artifact_name}: {forbidden}")

          required_wheel_files = {
              "django_asklens/__init__.py",
              "django_asklens/api/views.py",
              "django_asklens/templates/admin/django_asklens/asklensquery/change_list.html",
              "django_asklens/templates/django_asklens/frontend/query.html",
          }
          missing_wheel_files = sorted(required_wheel_files - wheel_names)
          if missing_wheel_files:
              raise SystemExit(f"Missing expected wheel files: {missing_wheel_files}")

          required_sdist_suffixes = {
              "/README.md",
              "/LICENSE",
              "/docs/index.md",
              "/docs/installation.md",
              "/docs/providers.md",
              "/docs/security-checklist.md",
          }
          missing_sdist_files = sorted(
              suffix
              for suffix in required_sdist_suffixes
              if not any(name.endswith(suffix) for name in sdist_names)
          )
          if missing_sdist_files:
              raise SystemExit(f"Missing expected sdist files: {missing_sdist_files}")
          PY

      - name: Smoke test core wheel install without DRF
        run: |
          bash .github/scripts/wheel-smoke.sh \
            core \
            "${{ matrix.django-package }}" \
            "${{ matrix.django-version-prefix }}"

      - name: Smoke test MCP extra wheel install
        run: |
          bash .github/scripts/wheel-smoke.sh \
            mcp \
            "${{ matrix.django-package }}" \
            "${{ matrix.django-version-prefix }}"

      - name: Smoke test API extra wheel install
        run: |
          bash .github/scripts/wheel-smoke.sh \
            api \
            "${{ matrix.django-package }}" \
            "${{ matrix.django-version-prefix }}"
