name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        django-version: ["5.2", "6.x"]
        include:
          - django-version: "5.2"
            django-package: "Django>=5.2,<6.0"
            django-version-prefix: "5.2."
          - django-version: "6.x"
            django-package: "Django>=6.0,<7.0"
            django-version-prefix: "6."

    env:
      DJANGO_ASKLENS_LIVE_LLM: "0"
      DJANGO_ASKLENS_DEMO_LIVE_LLM: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Install Django matrix version
        run: uv pip install --reinstall "${{ matrix.django-package }}"

      - name: Run Ruff lint
        run: uv run --no-sync ruff check .

      - name: Check formatting
        run: uv run --no-sync ruff format --check .

      - name: Compile Python files
        run: uv run --no-sync python -m compileall -q django_asklens tests

      - name: Run Django system check
        run: uv run --no-sync python -m django check --settings=tests.test_project.settings

      - name: Check AskLens migrations are current
        run: uv run --no-sync python -m django makemigrations asklens --check --dry-run --settings=tests.test_project.settings

      - name: Run tests
        run: uv run --no-sync pytest --strict-config --strict-markers

      - name: Build package
        run: uv run --no-sync python -m build

      - name: Check package metadata
        run: uv run --no-sync twine check dist/*

      - name: Inspect package artifacts
        run: |
          uv run --no-sync python - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          dist = Path("dist")
          wheels = sorted(dist.glob("django_asklens-*.whl"))
          sdists = sorted(dist.glob("django_asklens-*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"Expected one wheel and one sdist, got {wheels=} {sdists=}")

          with zipfile.ZipFile(wheels[0]) as wheel:
              wheel_names = set(wheel.namelist())
          with tarfile.open(sdists[0], "r:gz") as sdist:
              sdist_names = set(sdist.getnames())

          forbidden_fragments = (".agents/", "asklens-llm-io")
          for artifact_name, names in ((wheels[0].name, wheel_names), (sdists[0].name, sdist_names)):
              forbidden = [
                  name
                  for name in names
                  if any(fragment in name for fragment in forbidden_fragments)
              ]
              if forbidden:
                  raise SystemExit(f"Forbidden local-only files in {artifact_name}: {forbidden}")

          required_wheel_files = {
              "django_asklens/__init__.py",
              "django_asklens/api/views.py",
              "django_asklens/templates/admin/django_asklens/asklensquery/change_list.html",
              "django_asklens/templates/django_asklens/frontend/query.html",
          }
          missing_wheel_files = sorted(required_wheel_files - wheel_names)
          if missing_wheel_files:
              raise SystemExit(f"Missing expected wheel files: {missing_wheel_files}")

          required_sdist_suffixes = {
              "/README.md",
              "/LICENSE",
              "/docs/index.md",
              "/docs/installation.md",
              "/docs/providers.md",
              "/docs/security-checklist.md",
          }
          missing_sdist_files = sorted(
              suffix
              for suffix in required_sdist_suffixes
              if not any(name.endswith(suffix) for name in sdist_names)
          )
          if missing_sdist_files:
              raise SystemExit(f"Missing expected sdist files: {missing_sdist_files}")
          PY

      - name: Smoke test core wheel install without DRF
        run: |
          smoke_venv="$(mktemp -d)"
          python -m venv "$smoke_venv"
          "$smoke_venv/bin/python" -m pip install --upgrade pip
          "$smoke_venv/bin/python" -m pip install "${{ matrix.django-package }}"
          "$smoke_venv/bin/python" -m pip install dist/django_asklens-*.whl
          DJANGO_VERSION_PREFIX="${{ matrix.django-version-prefix }}" "$smoke_venv/bin/python" - <<'PY'
          import importlib.util
          import os
          from types import SimpleNamespace

          import django
          import django_asklens
          from django.conf import settings
          from django.core.management import call_command

          assert django_asklens.__version__ == "0.1.0a0"
          assert django.get_version().startswith(os.environ["DJANGO_VERSION_PREFIX"])
          assert importlib.util.find_spec("rest_framework") is None

          settings.configure(
              SECRET_KEY="django-asklens-ci-core-smoke-test",
              INSTALLED_APPS=[
                  "django.contrib.auth",
                  "django.contrib.contenttypes",
                  "django_asklens",
              ],
              DATABASES={
                  "default": {
                      "ENGINE": "django.db.backends.sqlite3",
                      "NAME": ":memory:",
                  }
              },
              MIDDLEWARE=[],
              DEFAULT_AUTO_FIELD="django.db.models.BigAutoField",
              USE_TZ=True,
          )
          django.setup()
          call_command("check")

          from django_asklens.access import can_access_asklens
          from django_asklens.catalog.registry import serialize_catalog
          from django_asklens.mcp import AskLensMCPToolSet
          from django_asklens.planning import parse_query_plan

          request = SimpleNamespace(user=SimpleNamespace(is_authenticated=True))
          assert can_access_asklens(request) is True
          assert serialize_catalog()["resources"] == []
          assert AskLensMCPToolSet(request_factory=lambda _context: request).tools()
          assert parse_query_plan(
              {"resource": "orders", "intent": "list", "select": [], "limit": 1}
          ).resource == "orders"
          PY

      - name: Smoke test MCP extra wheel install
        run: |
          smoke_venv="$(mktemp -d)"
          python -m venv "$smoke_venv"
          wheel="$(echo dist/django_asklens-*.whl)"
          "$smoke_venv/bin/python" -m pip install --upgrade pip
          "$smoke_venv/bin/python" -m pip install "${{ matrix.django-package }}"
          "$smoke_venv/bin/python" -m pip install "${wheel}[mcp]"
          DJANGO_VERSION_PREFIX="${{ matrix.django-version-prefix }}" "$smoke_venv/bin/python" - <<'PY'
          import asyncio
          import importlib.util
          import os
          from types import SimpleNamespace

          import django
          from django.conf import settings
          from django.core.management import call_command

          assert django.get_version().startswith(os.environ["DJANGO_VERSION_PREFIX"])
          assert importlib.util.find_spec("fastmcp") is not None
          assert importlib.util.find_spec("rest_framework") is None

          settings.configure(
              SECRET_KEY="django-asklens-ci-mcp-smoke-test",
              INSTALLED_APPS=[
                  "django.contrib.auth",
                  "django.contrib.contenttypes",
                  "django_asklens",
              ],
              DATABASES={
                  "default": {
                      "ENGINE": "django.db.backends.sqlite3",
                      "NAME": ":memory:",
                  }
              },
              MIDDLEWARE=[],
              DEFAULT_AUTO_FIELD="django.db.models.BigAutoField",
              USE_TZ=True,
          )
          django.setup()
          call_command("check")

          from django_asklens.mcp import AskLensMCPToolSet, create_fastmcp_server

          request = SimpleNamespace(
              user=SimpleNamespace(is_authenticated=True, get_all_permissions=lambda: set())
          )
          toolset = AskLensMCPToolSet(request_factory=lambda _context: request)
          server = create_fastmcp_server(toolset)
          tools = asyncio.run(server.list_tools())
          assert {tool.name for tool in tools} == {
              "asklens_capabilities",
              "asklens_query_plan_schema",
              "asklens_describe_resource",
              "asklens_validate_plan",
              "asklens_execute_plan",
          }
          PY

      - name: Smoke test API extra wheel install
        run: |
          smoke_venv="$(mktemp -d)"
          python -m venv "$smoke_venv"
          wheel="$(echo dist/django_asklens-*.whl)"
          "$smoke_venv/bin/python" -m pip install --upgrade pip
          "$smoke_venv/bin/python" -m pip install "${{ matrix.django-package }}"
          "$smoke_venv/bin/python" -m pip install "${wheel}[api]"
          DJANGO_VERSION_PREFIX="${{ matrix.django-version-prefix }}" "$smoke_venv/bin/python" - <<'PY'
          import importlib.util
          import os

          import django
          from django.conf import settings
          from django.core.management import call_command

          assert django.get_version().startswith(os.environ["DJANGO_VERSION_PREFIX"])
          assert importlib.util.find_spec("rest_framework") is not None

          settings.configure(
              SECRET_KEY="django-asklens-ci-api-smoke-test",
              INSTALLED_APPS=[
                  "django.contrib.auth",
                  "django.contrib.contenttypes",
                  "rest_framework",
                  "django_asklens",
              ],
              DATABASES={
                  "default": {
                      "ENGINE": "django.db.backends.sqlite3",
                      "NAME": ":memory:",
                  }
              },
              MIDDLEWARE=[],
              ROOT_URLCONF="django_asklens.api.urls",
              DEFAULT_AUTO_FIELD="django.db.models.BigAutoField",
              USE_TZ=True,
          )
          django.setup()
          call_command("check")

          import django_asklens.api.urls

          assert django_asklens.api.urls.urlpatterns
          PY
